version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_URL_API: ${VITE_URL_API:-http://backend:80}
    image: jogojagad-frontend:latest
    container_name: jogojagad-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    environment:
      - NODE_ENV=production
    networks:
      - jogojagad
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jogojagad-backend:latest
    container_name: jogojagad-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-jogojagad}
      DB_USERNAME: ${MYSQL_USER:-jogojagad}
      DB_PASSWORD: ${MYSQL_PASSWORD:-jogojagad123}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - laravel_storage:/var/www/storage
      - laravel_cache:/var/www/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jogojagad

  queue:
    image: jogojagad-backend:latest
    container_name: jogojagad-queue
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-jogojagad}
      DB_USERNAME: ${MYSQL_USER:-jogojagad}
      DB_PASSWORD: ${MYSQL_PASSWORD:-jogojagad123}
    command: php artisan queue:work --tries=3
    volumes:
      - laravel_storage:/var/www/storage
      - laravel_cache:/var/www/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jogojagad

  db:
    image: mysql:8.4
    container_name: jogojagad-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jogojagad}
      MYSQL_USER: ${MYSQL_USER:-jogojagad}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jogojagad123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jogojagad

volumes:
  mysql_data:
  laravel_storage:
  laravel_cache:

networks:
  jogojagad:
    driver: bridge
